{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">📚</div>
      <div class="auth-logo-title font-comic">AI Comic Textbook</div>
      <div class="auth-logo-sub">Learn Visually, Remember Forever</div>
    </div>

    <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;text-align:center;">Welcome back</h2>

    {% if form.errors %}
    <div class="alert alert-error">Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
        Sign In →
      </button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center;font-size:0.875rem;color:var(--text-muted);">
      No account? <a href="{% url 'register' %}" class="text-accent">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
